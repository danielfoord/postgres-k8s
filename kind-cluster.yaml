apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: postgres-k8s
nodes:
  - role: control-plane
    # Port mappings required for the nginx ingress controller
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker
  - role: worker
