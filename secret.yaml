---
# Superuser (postgres) credentials
# Change password before production use
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
  namespace: data
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: supersecret123

---
# Application user credentials
# Change password before production use
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app
  namespace: data
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: appsecret123
