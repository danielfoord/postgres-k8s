# kube-prometheus-stack Helm values
# Tuned for a local kind cluster with limited memory (~3-4GB total)

# Disable alertmanager — saves ~150MB
alertmanager:
  enabled: false

# Prometheus
prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

# Grafana
grafana:
  adminPassword: grafanaadmin123
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.localhost
  # Sidecar loads dashboards from ConfigMaps labelled grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# Node exporter — minimal resources
prometheus-node-exporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 100m

# kube-state-metrics — minimal resources
kube-state-metrics:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 100m

# Prometheus operator — minimal resources
prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
